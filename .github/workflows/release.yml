name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            binary: src-tauri/target/release/jgrpp-launcher
            artifact_name: jgrpp-launcher-linux-x64
          - runner: windows-latest
            binary: src-tauri/target/release/jgrpp-launcher.exe
            artifact_name: jgrpp-launcher-windows-x64.exe
    
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri binary
        run: npm run tauri build -- --no-bundle

      - name: Rename binary (Linux)
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          mv src-tauri/target/release/jgrpp-launcher jgrpp-launcher-linux

      - name: Rename binary (Windows)
        if: matrix.runner == 'windows-latest'
        run: |
          mv src-tauri/target/release/jgrpp-launcher.exe jgrpp-launcher-windows.exe

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
